services:
  # ─────────────────────────────────────────────
  # OpenAgent Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm openagent-agent -m "Hello"
  # ─────────────────────────────────────────────
  openagent-agent:
    image: docker.io/fahimahamedwork/openagent:latest
    container_name: openagent-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.openagent
    entrypoint: ["openagent", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # OpenAgent Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  openagent-gateway:
    image: docker.io/fahimahamedwork/openagent:latest
    container_name: openagent-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.openagent

  # ─────────────────────────────────────────────
  # OpenAgent Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  openagent-launcher:
    image: docker.io/fahimahamedwork/openagent:launcher
    container_name: openagent-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - OPENAGENT_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- OPENAGENT_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.openagent
